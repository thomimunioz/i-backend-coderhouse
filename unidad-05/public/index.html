<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API REST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="bg-success">
        <h1 class="text-white">API REST</h1>
        <img src="images/api.png" alt="icono">
    </header>
    <main class="container">
        <div class="row mt-4 justify-content-center">
            <div class="col-md-4">
                <form action="/api/users" method="post" class="card p-4" enctype="multipart/form-data">
                    <label for="nombre">Nombre</label>
                    <input type="text" class="form-control mt-2" name="name">

                    <label for="email" class="mt-3">Email</label>
                    <input type="email" class="form-control mt-2" name="email">

                    <label for="password" class="mt-3">Contraseña</label>
                    <input type="password" class="form-control mt-2" name="password">

                    <label for="foto" class="mt-3">Foto</label>
                    <input type="file" class="form-control mt-2" name="file">

                    <button type="submit" class="btn btn-success mt-4">Guardar</button>
                </form>
            </div>
        </div>
        <div class="col-md-4"></div>
        <div class="col-md-4"></div>
        </div>
    </main>
    <footer class="bg-dark">
        <p class="text-white"> CODER | Backend I | C81295</p>
    </footer>
</body>
</html>
